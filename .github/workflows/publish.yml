name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

env:
  CARGO_TERM_COLOR: always
  CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}

jobs:
  # Verify before publishing
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Format check
        run: cargo fmt --all -- --check
      
      - name: Clippy check
        run: cargo clippy -- -D warnings
      
      - name: Run tests
        run: cargo test
      
      - name: Verify package
        run: cargo package --no-verify
      
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: target/package/
          retention-days: 7

  # Build for all platforms
  build-release:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [verify]
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: showpid-windows-x86_64
            binary_name: showpid.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: showpid-linux-x86_64
            binary_name: showpid
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: showpid-macos-x86_64
            binary_name: showpid
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev
      
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Prepare release package
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} release/
          cp README.md release/
          cp LICENSE release/
          cd release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../${{ matrix.artifact_name }}.zip *
          else
            tar czf ../${{ matrix.artifact_name }}.tar.gz *
          fi
      
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.*
          retention-days: 7

  # Create GitHub Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-release]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display structure of downloaded files
        run: ls -R artifacts
      
      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release v${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## showpid v${{ steps.get_version.outputs.VERSION }}
            
            Cross-platform utility to bring window of specified PID to foreground.
            
            ### Supported Platforms
            - Windows (x86_64)
            - Linux (x86_64)
            - macOS (x86_64)
            
            ### Installation
            
            #### From Crates.io
            ```bash
            cargo install showpid
            ```
            
            #### From GitHub Releases
            Download the appropriate binary for your platform:
            - Windows: `showpid-windows-x86_64.zip`
            - Linux: `showpid-linux-x86_64.tar.gz`
            - macOS: `showpid-macos-x86_64.tar.gz`
            
            ### Usage
            ```bash
            showpid <PID>
            showpid -v <PID>  # verbose mode
            ```
            
            ### Changes
            See [CHANGELOG.md](https://github.com/cumulus13/showpid/blob/main/CHANGELOG.md) for details.
          files: |
            artifacts/showpid-windows-x86_64/showpid-windows-x86_64.zip
            artifacts/showpid-linux-x86_64/showpid-linux-x86_64.tar.gz
            artifacts/showpid-macos-x86_64/showpid-macos-x86_64.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to crates.io
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [create-release]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Verify tag matches version
        shell: bash
        run: |
          VERSION_IN_TOML=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          VERSION_IN_TAG=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION_IN_TOML" != "$VERSION_IN_TAG" ]; then
            echo "Version in Cargo.toml ($VERSION_IN_TOML) doesn't match tag version ($VERSION_IN_TAG)"
            exit 1
          fi
      
      - name: Dry run publish
        run: cargo publish --dry-run
      
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_TOKEN }}