name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Check code formatting
  fmt:
    name: Rustfmt
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Lint with Clippy
  clippy:
    name: Clippy
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run Clippy
        run: cargo clippy -- -D warnings

  # Build and test
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    needs: [fmt, clippy]
    strategy:
      matrix:
        toolchain: [stable, beta]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.arch }}-pc-windows-msvc
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ matrix.toolchain }}-
      
      - name: Check compilation
        run: cargo check --target ${{ matrix.arch }}-pc-windows-msvc
      
      - name: Run tests
        run: cargo test --target ${{ matrix.arch }}-pc-windows-msvc
      
      - name: Build release
        run: cargo build --release --target ${{ matrix.arch }}-pc-windows-msvc
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: showpid-${{ matrix.arch }}-pc-windows-msvc
          path: target/${{ matrix.arch }}-pc-windows-msvc/release/showpid.exe
          retention-days: 30

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit

  # MinRustV check
  msrv:
    name: MSRV Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.70.0
      - name: Check MSRV
        run: cargo check